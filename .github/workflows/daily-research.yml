name: Weekly signal collection

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Issue/email/history)'
        type: boolean
        default: false
  schedule:
    - cron: '30 23 * * 0'  # 毎週日曜 23:30 UTC = JST 月曜 08:30

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  collect-search-hypothesize:
    runs-on: ubuntu-latest
    env:
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase openai requests

      - name: Install Playwright (fallback)
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps
        if: ${{ !env.EXA_API_KEY }}

      - name: "信号収集（日次モード: 15-20クエリ）"
        run: python bot/collect.py --daily

      - name: 検索実行
        run: python bot/search.py

      - name: "仮説生成（DeepSeek + 重複排除）"
        run: python bot/hypothesize.py

      - name: ナレッジフィルタリング
        run: python bot/filter.py

      - name: "Issue投稿（フィルタ通過分）"
        if: ${{ !inputs.dry_run }}
        run: python bot/ideation.py post-signals

      - name: 結果をコミット
        run: |
          git config user.name "ideation-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f bot/signals_raw.json bot/signals_hypotheses.json bot/signals_filtered.json
          git diff --cached --quiet || git commit -m "chore: weekly signals $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push
