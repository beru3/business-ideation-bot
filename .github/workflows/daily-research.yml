name: Daily signal collection

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Issue/email/history)'
        type: boolean
        default: false
  schedule:
    - cron: '30 23 * * *'  # 毎日 23:30 UTC = JST 08:30

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase

      - name: 信号収集（クエリ生成）
        run: python bot/collect.py

      - name: 収集結果をコミット
        run: |
          git config user.name "ideation-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot/signals_raw.json
          git diff --cached --quiet || git commit -m "chore: collect signals $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push
