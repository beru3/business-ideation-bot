name: Daily business ideation research

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 毎日 00:00 UTC = JST 09:00

permissions:
  contents: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --prefix bot

      - name: 調査実行・メール送信
        run: node bot/research.mjs
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: 履歴をコミット
        run: |
          git config user.name "ideation-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot/results_history.json bot/rotation_state.json
          git diff --cached --quiet || git commit -m "chore: update research history $(date -u +%Y-%m-%d)"
          git push
