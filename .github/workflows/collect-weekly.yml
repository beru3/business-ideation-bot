name: Collect signals (weekly laws)

on:
  workflow_dispatch:
  schedule:
    # 月曜 JST 07:23 (UTC 日曜 22:23)。cron分は0分を避ける
    - cron: '23 22 * * 0'

permissions:
  contents: write

concurrency:
  group: collect-signals
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # laws コレクタは stdlib のみで動作 (依存インストール不要)
      - name: Collect laws
        run: python bot/collectors/laws.py

      - name: Commit signal data
        if: always()
        run: |
          git config user.name "signal-bot"
          git config user.email "noreply@anthropic.com"
          git add bot/data/signals/
          if ! git diff --staged --quiet; then
            git commit -m "chore: weekly laws signal collection [skip ci]"
            git pull --rebase origin master
            git push
          fi
